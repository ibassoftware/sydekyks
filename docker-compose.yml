services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: sydekyks-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sydekyks
      POSTGRES_PASSWORD: sydekyks
      POSTGRES_DB: sydekyks
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
